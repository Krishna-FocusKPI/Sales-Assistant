# Safe template for Docker builds (committed to git). Copy to secrets.toml locally and fill in real values.
# On DigitalOcean App Platform, inject production secrets via env VERSA_STREAMLIT_SECRETS_B64 (base64 of your real secrets.toml).
#
# LLM keys: use [openai] / [anthropic] below (read by src/common/provider.py). Env overrides: OPENAI_API_KEY, OPENAI_MODEL, etc.

[openai]
api_key = "REPLACE_ME"
model = "gpt-4o-mini"
embedding_model = "text-embedding-3-small"

[llm]
provider = "openai"

# [anthropic]
# api_key = ""
# model = ""

# [embedding]
# provider = "openai"

[server]
address = "0.0.0.0"
port = 8501
enableCORS = false
enableXsrfProtection = false
headless = true

[connections.snowflake]
account = ""
user = ""
password = ""
role = ""
warehouse = ""
database = ""
schema = ""

[logging]
log_dir = "/.versa/logs"

[dag]
dag_dir = "/.versa/dags"

[downloads]
tmp_base_path = "/tmp"
tmp_download_path = "https://example.com/files"
deck_saving_path = "/tmp"
deck_download_path = "https://example.com/files"

[ppr]
num_of_recommendations = 7
product_image_dir = "/images"

[ppr.table]
distributor_table = ""
logo_table = ""
product_table = ""
recommendation_table = ""
recurring_sales_table = ""
logo_sales_table = ""

[ppr.categories]
drinkware = ["drinkware", "mug", "mugs"]
stationery = ["stationery", "journal"]
bags = ["bags", "tote"]
"home & outdoor" = ["home", "outdoor"]
apparel = ["apparel", "clothing"]
technology = ["technology", "tech"]

[ppr.categories_explanation]
drinkware = "Drinkware."
stationery = "Stationery."
bags = "Bags."
"home & outdoor" = "Home and outdoor."
apparel = "Apparel."
technology = "Technology."

[ppr.product]
sql_filterable_columns = ["color", "price"]
rag_filterable_columns = ["product_type", "brand_name"]

[ppr.deck]
template_path = "/.versa/workflows/ppr_template.pptx"
template_page_number = 5
page_intro = 0
page_logo_sales_analysis = 1
page_product_listing = 2
page_product_details = 3
page_news_analysis = 4
item_per_listing_page = 6

[ppr.news_analysis]
days_to_lookback = 30
max_articles_per_topic = 5

[ppr.news_analysis.topics]
"Partnership, Sponsorships" = ["Partnership", "Sponsorship"]

[ipr]
num_of_recommendations = 7
product_image_dir = "/images"

[ipr.table]
naics_code_to_industry = "/.versa/workflows/naics_code_mapping.csv"
product_table = ""
recommendation_table = ""

[ipr.categories]
drinkware = ["drinkware", "mug"]
stationery = ["stationery"]
bags = ["bags"]
"home & outdoor" = ["home", "outdoor"]
apparel = ["apparel"]
technology = ["technology"]

[ipr.categories_explanation]
drinkware = "Drinkware."
stationery = "Stationery."
bags = "Bags."
"home & outdoor" = "Home and outdoor."
apparel = "Apparel."
technology = "Technology."

[ipr.product]
sql_filterable_columns = ["color", "price"]
rag_filterable_columns = ["product_type", "brand_name"]

[ipr.deck]
template_path = "/.versa/workflows/ipr_template.pptx"
template_page_number = 3
page_intro = 0
page_product_listing = 1
page_product_details = 2
item_per_listing_page = 6

[mpr]
num_of_recommendations = 7
product_image_dir = "/images"

[mpr.table]
distributor_table = ""
product_table = ""
recommendation_table = ""

[mpr.categories]
drinkware = ["drinkware"]
stationery = ["stationery"]
bags = ["bags"]
"home & outdoor" = ["home", "outdoor"]
apparel = ["apparel"]
technology = ["technology"]

[mpr.categories_explanation]
drinkware = "Drinkware."
stationery = "Stationery."
bags = "Bags."
"home & outdoor" = "Home and outdoor."
apparel = "Apparel."
technology = "Technology."

